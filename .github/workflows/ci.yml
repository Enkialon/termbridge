name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Go relay: build check ────────────────────────────────────────
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build relay
        run: cd server && go build ./cmd/relay

  # ── Flutter: compile check (Android debug) ───────────────────────
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Flutter Rust Bridge codegen
        working-directory: client
        run: |
          cargo install flutter_rust_bridge_codegen --locked
          flutter_rust_bridge_codegen generate

      - name: Flutter analyze
        working-directory: client
        run: flutter analyze lib/

      - name: Flutter build APK (debug)
        working-directory: client
        run: flutter build apk --debug
