name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Go relay server ──────────────────────────────────────────────
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build relay (linux + windows)
        run: |
          cd server
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o bin/relay-linux-amd64   ./cmd/relay
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o bin/relay-windows-amd64.exe ./cmd/relay

      - uses: actions/upload-artifact@v4
        with:
          name: relay
          path: |
            server/bin/relay-linux-amd64
            server/bin/relay-windows-amd64.exe

  # ── Flutter Android ──────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Build APK
        working-directory: client
        run: flutter build apk --release

      - name: Build AppBundle
        working-directory: client
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            client/build/app/outputs/flutter-apk/app-release.apk
            client/build/app/outputs/bundle/release/app-release.aab

  # ── Flutter Linux Desktop ────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev liblzma-dev pkg-config libwebkit2gtk-4.1-dev

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Flutter build linux
        working-directory: client
        run: flutter build linux --release

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: client/build/linux/x64/release/bundle/

  # ── Flutter Windows Desktop ──────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Flutter build windows
        working-directory: client
        run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: client/build/windows/x64/runner/Release/

  # ── Flutter macOS Desktop ────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Flutter build macos
        working-directory: client
        run: flutter build macos --release

      - name: Package macOS .app
        run: |
          cd client/build/macos/Build/Products/Release
          zip -r ../../../../../macos-app.zip ./*.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: client/macos-app.zip

  # ── Flutter iOS (unsigned — needs re-signing before install) ─────
  ios-unsigned:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: CocoaPods install
        working-directory: client/ios
        run: pod install

      - name: Flutter build iOS (no codesign)
        working-directory: client
        run: flutter build ios --release --no-codesign

      - name: Package iOS .app
        run: |
          cd client/build/ios/iphoneos
          zip -r ../../../../ios-unsigned.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: client/ios-unsigned.zip

  # ── GitHub Release (tag only) ────────────────────────────────────
  github-release:
    needs: [relay, android, linux, windows, macos, ios-unsigned]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release-assets
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            (cd "$name" && zip -r "../../release-assets/${name}.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
